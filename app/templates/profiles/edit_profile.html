{% extends "base.html" %}
{% block title %}Edit Profile — MeetingPoint{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">Edit Profile</h2>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control"
               value="{{ user.name }}" maxlength="100" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Bio</label>
        <textarea name="bio" class="form-control" rows="3"
                  maxlength="500">{{ user.bio or '' }}</textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Location</label>
        <input type="text" name="location" class="form-control"
               value="{{ user.location or '' }}" maxlength="150">
      </div>

      <div class="mb-3">
        <label class="form-label">Interests (comma separated)</label>
        <input type="text" name="interests" class="form-control"
               value="{{ user.interests or '' }}" maxlength="255">
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" name="is_profile_public"
               class="form-check-input" id="is_profile_public"
               {% if user.is_profile_public %}checked{% endif %}>
        <label class="form-check-label" for="is_profile_public">Public profile</label>
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" name="is_history_public"
               class="form-check-input" id="is_history_public"
               {% if user.is_history_public %}checked{% endif %}>
        <label class="form-check-label" for="is_history_public">
          Show my event history publicly
        </label>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('main.profile', user_id=user.id) }}"
           class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
