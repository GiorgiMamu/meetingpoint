{% extends "base.html" %}
{% block title %}Edit Profile — MeetingPoint{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="auth-card">
            <h2 class="text-center mb-4">Edit profile</h2>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control"
                           value="{{ user.name }}" maxlength="100" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Bio</label>
                    <textarea name="bio" class="form-control" rows="3"
                              maxlength="500" placeholder="Tell people about yourself...">{{ user.bio or '' }}</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control"
                           value="{{ user.location or '' }}" maxlength="150"
                           placeholder="e.g. Tbilisi, Georgia">
                </div>
                <div class="mb-4">
                    <label class="form-label">Interests <span class="text-muted small">(comma separated)</span></label>
                    <input type="text" name="interests" class="form-control"
                           value="{{ user.interests or '' }}" maxlength="255"
                           placeholder="e.g. hiking, music, cinema">
                </div>

                <h6 class="section-title mb-3">Privacy</h6>
                <div class="mb-2 form-check">
                    <input type="checkbox" name="is_profile_public"
                           class="form-check-input" id="is_profile_public"
                           {% if user.is_profile_public %}checked{% endif %}>
                    <label class="form-check-label" for="is_profile_public">
                        Public profile <span class="text-muted small">— others can view your profile</span>
                    </label>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" name="is_history_public"
                           class="form-check-input" id="is_history_public"
                           {% if user.is_history_public %}checked{% endif %}>
                    <label class="form-check-label" for="is_history_public">
                        Public history <span class="text-muted small">— others can see your event history</span>
                    </label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{{ url_for('main.profile', user_id=user.id) }}"
                       class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
