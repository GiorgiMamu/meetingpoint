{% extends "base.html" %}
{% block title %}Not found — MeetingPoint{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <div aria-label="Page not found" class="empty-state-icon">🔍</div>
        <h1 class="mb-2" style="font-size:3.5rem; color:var(--charcoal-light);">404</h1>
        <h4 class="mb-3">Page not found</h4>
        <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
        <div class="d-flex justify-content-center gap-2">
            <a class="btn btn-primary" href="{{ url_for('main.index') }}">Go home</a>
            {% if current_user.is_authenticated %}
            <a class="btn btn-outline-secondary" href="{{ url_for('main.discover') }}">Discover events</a>
            {% else %}
            <a class="btn btn-outline-secondary" href="{{ url_for('main.login') }}">Log in</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
