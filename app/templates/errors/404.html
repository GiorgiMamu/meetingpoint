{% extends "base.html" %}
{% block title %}404 Not Found — MeetingPoint{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <div style="font-size:5rem; margin-bottom:1rem;">🔍</div>
        <h1 class="mb-2" style="font-size:3.5rem; color:var(--charcoal-light);">404</h1>
        <h4 class="mb-3">Page Not Found</h4>
        <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
        <div class="d-flex justify-content-center gap-2">
            <a href="{{ url_for('main.index') }}" class="btn btn-primary">Go Home</a>
            <a href="{{ url_for('main.discover') }}" class="btn btn-outline-secondary">Browse Events</a>
        </div>
    </div>
</div>
{% endblock %}
