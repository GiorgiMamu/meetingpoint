{% extends "base.html" %}
{% block title %}500 Server Error — MeetingPoint{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <div style="font-size:5rem; margin-bottom:1rem;">⚙️</div>
        <h1 class="mb-2" style="font-size:3.5rem; color:var(--charcoal-light);">500</h1>
        <h4 class="mb-3">Something Went Wrong</h4>
        <p class="text-muted mb-4">An unexpected error occurred on our end. The issue has been logged. Please try again in a moment.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary">Go Home</a>
    </div>
</div>
{% endblock %}
