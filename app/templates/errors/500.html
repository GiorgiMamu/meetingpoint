{% extends "base.html" %}
{% block title %}Unexpected error — MeetingPoint{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <div aria-label="Server error" class="empty-state-icon">⚙️</div>
        <h1 class="mb-2" style="font-size:3.5rem; color:var(--charcoal-light);">Sorry!</h1>
        <h4 class="mb-3">Something went wrong</h4>
        <p class="text-muted mb-4">An unexpected error occurred on our end. But fear not - chances are we're already
            fixing it</p>
        <a class="btn btn-primary" href="{{ url_for('main.index') }}">Go home</a>
    </div>
</div>
{% endblock %}
