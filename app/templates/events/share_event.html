{% extends "base.html" %}
{% block title %}Share — {{ event.title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <div style="font-size:3rem; margin-bottom:1rem;">🔗</div>
            <h3>Share this event</h3>
            <p class="text-muted">{{ event.title }}</p>
            <div class="input-group mb-3">
                <input type="text" id="share-url" class="form-control"
                       value="{{ share_url }}" readonly>
                <button class="btn btn-primary" onclick="copyLink()">Copy</button>
            </div>
            <p id="copy-msg" class="text-success small" style="display:none;">
                Link copied to clipboard!
            </p>
            <a href="{{ url_for('main.event_detail', event_id=event.id) }}"
               class="btn btn-outline-secondary mt-2">← Back to event</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function copyLink() {
    var input = document.getElementById('share-url');
    input.select();
    document.execCommand('copy');
    document.getElementById('copy-msg').style.display = 'block';
    setTimeout(function() {
        document.getElementById('copy-msg').style.display = 'none';
    }, 2000);
}
</script>
{% endblock %}
